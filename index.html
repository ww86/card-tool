<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VTES Custom Card Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Left Panel: Card details & text styling -->
    <div class="left-panel">
      <h2>Details</h2>
      
      <!-- Card Name with font controls -->
      <div class="input-group">
        <div class="h-selector">
          <label for="cardName">Name:</label>
          <input type="text" id="cardName" placeholder="Card Name">
        </div>

        <div class="settings-group">
          <!-- Text -->        
          <div class="inline-selector">
            <label for="nameFont">Font:</label>
            <select id="nameFont">
              <option value="Arial" selected>Arial</option>
              <option value="Courier New">Courier New</option>
              <option value="Times New Roman">Times New Roman</option>
              <option value="Georgia">Georgia</option>
            </select>
            <label for="nameFontSize">Size:</label>
            <select id="nameFontSize">
              <option value="20" selected>20</option>
              <option value="24">24</option>
              <option value="28">28</option>
              <option value="32">32</option>
            </select>
          </div>
          <div class="inline-selector">
            <label for="nameTextColor">Color:</label>
            <input type="color" id="nameTextColor" value="#000000">
            <label for="nameTextHex">#:</label>
            <input type="text" id="nameTextHex" value="#000000" maxlength="7" placeholder="#000000">
            <label for="nameTextOpacity">α:</label>
            <input type="number" id="nameTextOpacity" value="50" min="0" max="100">               
          </div>
        </div>
        
        <!-- Background -->
        <div class="input-group">
          <label>Name Background:</label>        
          <div class="inline-selector">
            <label for="nameBoxX">X:</label>
            <input type="number" id="nameBoxX" value="20">
            <label for="nameBoxY">Y:</label>
            <input type="number" id="nameBoxY" value="300">
          </div>
          <div class="inline-selector">
            <label for="nameBoxWidth">W:</label>
            <input type="number" id="nameBoxWidth" value="318">
            <label for="nameBoxHeight">H:</label>
            <input type="number" id="nameBoxHeight" value="100">
          </div>
          <div class="inline-selector">
            <label for="nameBgColor">Color:</label>
            <input type="color" id="nameBgColor" value="#ffffff">
            <label for="nameBgHex">#:</label>
            <input type="text" id="nameBgHex" value="#ffffff" maxlength="7" placeholder="#ffffff">
            <label for="nameBgOpacity">α:</label>
            <input type="number" id="nameBgOpacity" value="50" min="0" max="100">          
          </div>
        </div>  
      </div>
      

      
      <!-- Card Text with font controls -->
      <div class="input-group">
        <div class="h-selector">
          <label for="cardText">Card Text:</label>
          <input type="text" id="cardText" placeholder="Card Text">
        </div>

        <div class="settings-group">
          <!-- Text -->        
          <div class="inline-selector">
            <label for="textFont">Font:</label>
            <select id="textFont">
              <option value="Arial" selected>Arial</option>
              <option value="Courier New">Courier New</option>
              <option value="Times New Roman">Times New Roman</option>
              <option value="Georgia">Georgia</option>
            </select>
            <label for="textFontSize">Size:</label>
            <select id="textFontSize">
              <option value="20" selected>20</option>
              <option value="24">24</option>
              <option value="28">28</option>
              <option value="32">32</option>
            </select>
          </div>
          <div class="inline-selector">
            <label for="textTextColor">Color:</label>
            <input type="color" id="textTextColor" value="#000000">
            <label for="textTextHex">#:</label>
            <input type="text" id="textTextHex" value="#000000" maxlength="7" placeholder="#000000">
            <label for="nameTextOpacity">α:</label>
            <input type="number" id="textTextOpacity" value="50" min="0" max="100">               
          </div>
        </div>
        
        <!-- Background -->
        <div class="input-group">
          <label>Text Background:</label>        
          <div class="inline-selector">
            <label for="textBoxX">X:</label>
            <input type="number" id="textBoxX" value="20">
            <label for="textBoxY">Y:</label>
            <input type="number" id="textBoxY" value="300">
          </div>
          <div class="inline-selector">
            <label for="textBoxWidth">W:</label>
            <input type="number" id="textBoxWidth" value="318">
            <label for="textBoxHeight">H:</label>
            <input type="number" id="textBoxHeight" value="100">
          </div>
          <div class="inline-selector">
            <label for="nameBgColor">Color:</label>
            <input type="color" id="textBgColor" value="#ffffff">
            <label for="textBgHex">#:</label>
            <input type="text" id="textBgHex" value="#ffffff" maxlength="7" placeholder="#ffffff">
            <label for="textBgOpacity">α:</label>
            <input type="number" id="textBgOpacity" value="50" min="0" max="100">          
          </div>
        </div>  
      </div>
      
      <!-- Flavour Text with font controls -->    
      <div class="input-group">
        <div class="h-selector">
          <label for="cardFlavour">Name:</label>
          <input type="text" id="cardFlavour" placeholder="Card Flavour">
        </div>

        <div class="settings-group">
          <!-- Text -->        
          <div class="inline-selector">
            <label for="flavourFont">Font:</label>
            <select id="flavourFont">
              <option value="Arial" selected>Arial</option>
              <option value="Courier New">Courier New</option>
              <option value="Times New Roman">Times New Roman</option>
              <option value="Georgia">Georgia</option>
            </select>
            <label for="flavourFontSize">Size:</label>
            <select id="flavourFontSize">
              <option value="20" selected>20</option>
              <option value="24">24</option>
              <option value="28">28</option>
              <option value="32">32</option>
            </select>
          </div>
          <div class="inline-selector">
            <label for="flavourTextColor">Color:</label>
            <input type="color" id="flavourTextColor" value="#000000">
            <label for="flavourTextHex">#:</label>
            <input type="text" id="flavourTextHex" value="#000000" maxlength="7" placeholder="#000000">
            <label for="flavourTextOpacity">α:</label>
            <input type="number" id="flavourTextOpacity" value="50" min="0" max="100">               
          </div>
        </div>
        
        <!-- Background -->
        <div class="input-group">
          <label>Flavour Background:</label>        
          <div class="inline-selector">
            <label for="flavourBoxX">X:</label>
            <input type="number" id="flavourBoxX" value="20">
            <label for="flavourBoxY">Y:</label>
            <input type="number" id="flavourBoxY" value="300">
          </div>
          <div class="inline-selector">
            <label for="flavourBoxWidth">W:</label>
            <input type="number" id="flavourBoxWidth" value="318">
            <label for="flavourBoxHeight">H:</label>
            <input type="number" id="flavourBoxHeight" value="100">
          </div>
          <div class="inline-selector">
            <label for="flavourBgColor">Color:</label>
            <input type="color" id="flavourBgColor" value="#ffffff">
            <label for="flavourBgHex">#:</label>
            <input type="text" id="flavourBgHex" value="#ffffff" maxlength="7" placeholder="#ffffff">
            <label for="flavourBgOpacity">α:</label>
            <input type="number" id="flavourBgOpacity" value="50" min="0" max="100">          
          </div>
        </div>  
      </div>
      
      <!-- Artist with font controls -->
      <div class="input-group">
        <label for="artist">Artist:</label>
        <input type="text" id="artist" placeholder="Artist Name">
        <div class="inline-selector">
          <label for="artistFont">Font:</label>
          <select id="artistFont">
            <option value="Arial" selected>Arial</option>
            <option value="Courier New">Courier New</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Georgia">Georgia</option>
          </select>
          <label for="artistFontSize">Size:</label>
          <select id="artistFontSize">
            <option value="12" selected>12</option>
            <option value="14">14</option>
            <option value="16">16</option>
          </select>
        </div>
        <div class="inline-selector">
          <label for="artistTextColor">Text Color:</label>
          <input type="color" id="artistTextColor" value="#000000">
          <label for="artistTextHex">Hex:</label>
          <input type="text" id="artistTextHex" value="#000000" maxlength="7" placeholder="#000000">
        </div>
      </div>
      
      <!-- Optional: Add an antialiasing checkbox for text rendering -->
      <div class="input-group">
        <label for="textAntialias">Antialias Text:</label>
        <input type="checkbox" id="textAntialias" checked>
      </div>
    </div>
    
    <!-- Middle Panel: Toggle selectors -->
    <div class="middle-panel">
      <div class="section">
        <h2>Disciplines</h2>
        <div class="toggle-grid" id="disciplinesGrid">
          <!-- Discipline toggles are injected via script.js -->
        </div>
      </div>
      <div class="section">
        <h2>Clan Symbols</h2>
        <div class="toggle-grid" id="clansGrid">
          <div class="toggle-item">
            <input type="checkbox" id="clanAssamite">
            <label for="clanAssamite">Assamite</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanBrujah">
            <label for="clanBrujah">Brujah</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanBrujahAntitribu">
            <label for="clanBrujahAntitribu">Brujah Antitribu</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanGangrel">
            <label for="clanGangrel">Gangrel</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanGangrelAntitribu">
            <label for="clanGangrelAntitribu">Gangrel Antitribu</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanLasombra">
            <label for="clanLasombra">Lasombra</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanGiovanni">
            <label for="clanGiovanni">Giovanni</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanCappadocian">
            <label for="clanCappadocian">Cappadocian</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanAhrimane">
            <label for="clanAhrimane">Ahrimane</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanMalkavian">
            <label for="clanMalkavian">Malkavian</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanMalkavianAntitribu">
            <label for="clanMalkavianAntitribu">Malkavian Antitribu</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanFollowersOfSet">
            <label for="clanFollowersOfSet">Followers of Set</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanNosferatu">
            <label for="clanNosferatu">Nosferatu</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanNosferatuAntitribu">
            <label for="clanNosferatuAntitribu">Nosferatu Antitribu</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanRavnos">
            <label for="clanRavnos">Ravnos</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanSalubri">
            <label for="clanSalubri">Salubri</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanSalubriAntitribu">
            <label for="clanSalubriAntitribu">Salubri Antitribu</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanToreador">
            <label for="clanToreador">Toreador</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanToreadorAntitribu">
            <label for="clanToreadorAntitribu">Toreador Antitribu</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanTremere">
            <label for="clanTremere">Tremere</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanTremereAntitribu">
            <label for="clanTremereAntitribu">Tremere Antitribu</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanTzimisce">
            <label for="clanTzimisce">Tzimisce</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanVentrue">
            <label for="clanVentrue">Ventrue</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanVentrueAntitribu">
            <label for="clanVentrueAntitribu">Ventrue Antitribu</label>
          </div>
          <div class="toggle-item">
            <input type="checkbox" id="clanHarbringersOfSkulls">
            <label for="clanHarbringersOfSkulls">Harbringers of Skulls</label>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Art Panel: Image import & adjustments -->    
    <div class="art-panel">
      <h2>Art and Frame</h2>      
      <!-- Type and Subtype -->
      <div class="input-group">
        <label for="cardType">Type:</label>
        <select id="cardType">
          <option value="Crypt">Crypt</option>
          <option value="Library">Library</option>
        </select>
      </div>
      <div class="input-group">
        <label for="cardSubtype">Subtype:</label>
        <select id="cardSubtype">
          <option value="Action">Action</option>
          <option value="Political Action">Political Action</option>
          <option value="Employ Retainer">Employ Retainer</option>
          <option value="Emply minion">Emply minion</option>
          <option value="Equip action">Equip action</option>
          <option value="Modifier">Modifier</option>
          <option value="Reaction">Reaction</option>
          <option value="Combat">Combat</option>
          <option value="Event">Event</option>
          <option value="Master">Master</option>
        </select>
      </div>
      <div class="input-group">
        <label for="frameType">Frame Type:</label>
        <select id="frameType">
          <option value="none" selected>None</option>
          <option value="normal">Normal</option>
          <option value="simple">Simple Border</option>
          <option value="classic">Classic Frame</option>
          <option value="modern">Modern Frame</option>
        </select>
      </div>      

      <div class="input-group">
        <label for="artFile">Upload Image:</label>
        <input type="file" id="artFile" accept="image/*">
      </div>
      <div class="input-group">
        <label for="artUrl">Image URL:</label>
        <input type="text" id="artUrl" placeholder="Enter image URL">
        <button id="loadArtUrl">Load Image</button>
      </div>
      <div class="input-group">
        <label for="offsetX">Offset X (px):</label>
        <input type="number" id="offsetX" value="0">
      </div>
      <div class="input-group">
        <label for="offsetY">Offset Y (px):</label>
        <input type="number" id="offsetY" value="0">
      </div>
      <div class="input-group">
        <label for="cropTop">Crop Top (px):</label>
        <input type="number" id="cropTop" value="0">
      </div>
      <div class="input-group">
        <label for="cropRight">Crop Right (px):</label>
        <input type="number" id="cropRight" value="0">
      </div>
      <div class="input-group">
        <label for="cropBottom">Crop Bottom (px):</label>
        <input type="number" id="cropBottom" value="0">
      </div>
      <div class="input-group">
        <label for="cropLeft">Crop Left (px):</label>
        <input type="number" id="cropLeft" value="0">
      </div>
      <div class="input-group">
        <label for="scalePercent">Scale (%):</label>
        <input type="number" id="scalePercent" value="100">
      </div>

    </div>
    
    <!-- Right Panel: Card preview and action buttons -->
    <div class="right-panel">
      <h2>Card Preview</h2>
      <canvas id="cardCanvas" width="358" height="500"></canvas>
      <div class="button-container">
        <button id="exportButton">Export as PNG</button>
        <button id="saveJsonButton">Save as JSON</button>
        <button id="importJsonButton">Import JSON</button>
      </div>
      <input type="file" id="jsonImport" accept="application/json" style="display:none;">
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
